<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gaussian blur intersect</title>
  <link type="text/css" rel="stylesheet" href="../main.css" />
</head>

<body>
  <!-- vertexShader -->
  <script id="vertexShader" type="x-shader/x-vertex">

    uniform mat4 projectionMatrix; // optional
    uniform mat4 modelViewMatrix; // optional

    varying vec2 vUv;
    varying vec3 vPos;

    attribute vec3 position;
    attribute vec2 uv;

    void main() {
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      vUv = uv;
    }
  </script>
  <!-- fragmentShader -->
  <script id="fragmentShader" type="x-shader/x-fragment">

    precision mediump float;

    uniform vec2 uIntersectUv;
    uniform float uIsIntersect;
    uniform float uSigma;
    uniform float uRadius;
    uniform vec2 uResolution;
    uniform sampler2D uTexture;

    varying vec2 vUv;

    float gaussian(float x, float sigma) {
      return exp(-(x * x) / (2.0 * sigma * sigma)) / (sqrt(6.2831853) * sigma);
    }

    void main()	{
      vec2 pixel = vec2(1.0) / uResolution;
      float weightSum = 0.0;
      vec4 color = vec4(0.0);
      const int samples = 4;

      if(uIsIntersect == 0.0){
        gl_FragColor = texture2D(uTexture, vUv);
        return;
      }
      
      float dist = abs(distance(uIntersectUv, vUv));

      if(abs(dist - uRadius) < 0.001){
        gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
        return;
      }

      if(dist > uRadius){
        gl_FragColor = texture2D(uTexture, vUv);
        return;
      }

      for(int x = -samples; x <= samples; x++) {
        for(int y = -samples; y <= samples; y++) {
          float weight = gaussian(float(x), uSigma) * gaussian(float(y), uSigma);
          color += texture2D(uTexture, vUv + vec2(x, y) * pixel) * weight;
          weightSum += weight;
        }
      }

      gl_FragColor = color / weightSum;
    }
  </script>
  <!-- scripts -->
  <script type="module">
    import * as THREE from "three";
    import * as dat from "dat.gui";
    import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
    import Stats from "three/examples/jsm/libs/stats.module";
    import textureUrl from "@/assets/images/uv_grid_opengl.jpg";

    let screenWidth = window.innerWidth;
    let screenHeight = window.innerHeight;

    // three
    let container, stats, scene, renderer, camera, orbitControl, mesh;
    let raycaster, mousePos;

    //
    const objects = [];

    // gui
    const params = {
      sigma: 2,
      radius: 0.3,
    }
    const gui = new dat.GUI();
    gui.add(params, "sigma", 0.1, 3, 0.1).onChange(() => {
      if (mesh) {
        mesh.material.uniforms.uSigma.value = params.sigma;
      }
    });
    gui.add(params, "radius", 0.1, 0.3, 0.1).onChange(() => {
      if (mesh) {
        mesh.material.uniforms.uRadius.value = params.radius;
      }
    });

    //
    const initThree = () => {
      container = document.createElement("div");
      document.body.appendChild(container);

      // stats
      stats = new Stats();
      container.appendChild(stats.dom);

      // scene
      scene = new THREE.Scene();

      // renderer
      renderer = new THREE.WebGLRenderer({
        antialias: true,
      });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(screenWidth, screenHeight);
      container.appendChild(renderer.domElement);

      // cameras
      camera = new THREE.PerspectiveCamera(
        50,
        screenWidth / screenHeight,
        0.01,
        10000
      );
      camera.position.set(0, 5, 0);

      // control
      orbitControl = new OrbitControls(camera, renderer.domElement);
      // orbitControl.enableDamping = true;

      // raycaster
      raycaster = new THREE.Raycaster();
      mousePos = new THREE.Vector2();

      // helper
      // const helper = new THREE.AxesHelper(10);
      // scene.add(helper);
    };

    //
    let lastCallTime = performance.now();
    const render = () => {
      orbitControl.update();
      renderer.render(scene, camera);
    };

    const onMouseMove = (event) => {
      mousePos.x = (event.clientX / screenWidth) * 2 - 1;
      mousePos.y = -(event.clientY / screenHeight) * 2 + 1;

      if (mesh && raycaster) {
        raycaster.setFromCamera(mousePos, camera);
        const intersects = raycaster.intersectObject(mesh);

        if (intersects.length > 0) {
          const intersectUv = intersects[0].uv.clone();
          console.log(intersectUv);


          mesh.material.uniforms.uIsIntersect.value = 1;
          mesh.material.uniforms.uIntersectUv.value = intersectUv;
        }
        else {
          mesh.material.uniforms.uIsIntersect.value = 0;
        }

      }
    }

    const animate = () => {
      requestAnimationFrame(animate);

      const time = performance.now() / 1000;

      render();
      stats.update();
    };

    //
    const resize = () => {
      screenWidth = window.innerWidth;
      screenHeight = window.innerHeight;

      renderer.setSize(screenWidth, screenHeight);

      camera.aspect = screenWidth / screenHeight;
      camera.updateProjectionMatrix();
    };

    //
    const addPlane = async () => {
      const texture = await new THREE.TextureLoader().loadAsync(textureUrl);

      const geo = new THREE.PlaneGeometry(3, 3, 64, 64);
      const mat = new THREE.RawShaderMaterial({
        vertexShader:
          document.getElementById("vertexShader").textContent,
        fragmentShader:
          document.getElementById("fragmentShader").textContent,
        side: THREE.DoubleSide,
        uniforms: {
          uTexture: { value: texture },
          uResolution: { value: new THREE.Vector2(texture.image.width, texture.image.height) },
          uSigma: { value: params.sigma },
          uRadius: { value: params.radius },
          uIsIntersect: { value: 0 },
          uIntersectUv: { value: new THREE.Vector2() },
        },
        transparent: true,
        // wireframe: true,
      });

      mesh = new THREE.Mesh(geo, mat);
      mesh.rotateX(-Math.PI / 2);

      scene.add(mesh);
    };

    // invoke
    initThree();
    window.addEventListener("resize", resize);
    window.addEventListener('mousemove', onMouseMove);
    animate();

    // stuff
    addPlane();
  </script>
</body>

</html>
